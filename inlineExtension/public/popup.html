<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inline Settings</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 300px;
      padding: 16px;
      font-family: system-ui, -apple-system, sans-serif;
      background: #f8fafc;
      color: #0f172a;
    }
    h1 { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
    p  { font-size: 11px; color: #64748b; margin-bottom: 14px; line-height: 1.4; }
    label { display: block; font-size: 11px; font-weight: 600; color: #475569; margin-bottom: 4px; }
    .hint { font-size: 10px; color: #94a3b8; margin-bottom: 8px; font-weight: 400; }
    input[type="text"], input[type="password"] {
      display: block;
      width: 100%;
      padding: 8px 10px;
      margin-bottom: 12px;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      font-size: 12px;
      background: #fff;
      outline: none;
    }
    input:focus { border-color: #5b8def; }
    button {
      width: 100%;
      padding: 10px;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      background: #5b8def;
      color: #fff;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
    }
    button:hover { background: #4a7de2; }
    .saved { font-size: 11px; color: #16a34a; margin-top: 8px; display: none; }
    .divider { height: 1px; background: #e2e8f0; margin: 14px 0; }
  </style>
</head>
<body>
  <h1>Inline</h1>
  <p>Connect to your dashboard for AI features and spatial saves.</p>

  <label>API base URL</label>
  <input type="text" id="apiBase" placeholder="http://localhost:3000" />

  <label>Access token <span class="hint">(optional — paste Supabase access token for authenticated routes)</span></label>
  <input type="password" id="token" placeholder="Bearer token" />

  <div class="divider"></div>
  <button id="save">Save settings</button>
  <p class="saved" id="savedMsg">✓ Saved.</p>

  <script>
    const $ = id => document.getElementById(id)
    chrome.storage.local.get(['inlineApiBase', 'inlineAccessToken'], r => {
      $('apiBase').value = r.inlineApiBase || 'http://localhost:3000'
      $('token').value   = r.inlineAccessToken || ''
    })
    $('save').addEventListener('click', () => {
      const base = ($('apiBase').value || 'http://localhost:3000').replace(/\/$/, '')
      chrome.storage.local.set({ inlineApiBase: base, inlineAccessToken: $('token').value }, () => {
        $('savedMsg').style.display = 'block'
        setTimeout(() => { $('savedMsg').style.display = 'none' }, 1500)
      })
    })
  </script>
</body>
</html>
