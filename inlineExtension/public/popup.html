<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Inline</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  width: 320px;
  padding: 20px;
  font-family: -apple-system, BlinkMacSystemFont, 'Inter', system-ui, sans-serif;
  background: #FDFBF7;
  color: #1C1E26;
}
.brand {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 4px;
}
.brand-icon {
  width: 28px; height: 28px;
  border-radius: 8px;
  background: #1C1E26;
  display: flex;
  align-items: center;
  justify-content: center;
}
.brand-icon span {
  display: block;
  width: 3px; height: 14px;
  border-radius: 2px;
  background: #fff;
  transform: rotate(-12deg);
}
.brand h1 {
  font-size: 16px;
  font-weight: 700;
  color: #1C1E26;
  letter-spacing: -0.02em;
}
.subtitle {
  font-size: 12px;
  color: #78716c;
  margin-bottom: 18px;
  line-height: 1.45;
}
.section-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: #78716c;
  margin-bottom: 6px;
}
label { display: block; font-size: 12px; font-weight: 600; color: #57534e; margin-bottom: 4px; }
.hint { font-size: 10px; color: #a8a29e; font-weight: 400; }
input[type="text"], input[type="password"] {
  display: block;
  width: 100%;
  padding: 10px 12px;
  margin-bottom: 14px;
  border: 1.5px solid #d6d3d1;
  border-radius: 10px;
  font-size: 12px;
  background: #fff;
  outline: none;
  color: #1C1E26;
  transition: border-color 0.15s;
}
input:focus { border-color: #4B83C4; }
input::placeholder { color: #a8a29e; }
.divider { height: 1px; background: #d6d3d1; margin: 16px 0; }
button {
  width: 100%;
  padding: 11px;
  border: none;
  border-radius: 10px;
  background: #1C1E26;
  color: #fff;
  font-weight: 600;
  font-size: 13px;
  cursor: pointer;
  transition: background 0.15s;
}
button:hover { background: #13151B; }
.saved {
  font-size: 11px;
  color: #15803d;
  margin-top: 10px;
  display: none;
  text-align: center;
  font-weight: 600;
}
.footer {
  margin-top: 16px;
  padding-top: 12px;
  border-top: 1px solid #d6d3d1;
  text-align: center;
}
.footer a {
  font-size: 11px;
  color: #4B83C4;
  text-decoration: none;
  font-weight: 600;
}
.footer a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="brand">
  <div class="brand-icon"><span></span></div>
  <h1>Inline</h1>
</div>
<p class="subtitle">Connect to your dashboard for AI features, highlights, and spatial saves.</p>

<p class="section-label">Connection</p>

<label>API base URL</label>
<input type="text" id="apiBase" placeholder="http://localhost:3000" />

<label>Access token <span class="hint">(optional &mdash; paste your Supabase access token)</span></label>
<input type="password" id="token" placeholder="Paste token here" />

<div class="divider"></div>
<button type="button" id="save">Save settings</button>
<p class="saved" id="savedMsg">Settings saved</p>

<div class="footer">
  <a href="http://localhost:3000" target="_blank" rel="noopener noreferrer">Open Inline Dashboard &rarr;</a>
</div>

<script src="popup.js"></script>
</body>
</html>
